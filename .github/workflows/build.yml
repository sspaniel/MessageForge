# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Build

on:
  pull_request:
    branches: ["**"]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore ./src/MessageForge.slnx

    - name: Build
      run: dotnet build ./src/MessageForge.slnx --no-restore

    - name: Test
      run: dotnet test ./src/MessageForge.slnx --no-build --verbosity normal
