# Runs the full test suite using build artifacts produced by the Build workflow.

name: Test

on:
  workflow_call:

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Test
      run: dotnet test ./src/MessageForge.slnx --no-build --verbosity normal
